# Registered before this pull request synchronization.
name: Finalize Bluetooth and crypto review fixes

on:
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'fix/bluetooth-crypto-rftag-review' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/bluetooth-crypto-rftag-review

      - name: Apply final source edits
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('src/bluetooth/bt_smp.cpp')
          text = path.read_text(encoding='ascii')

          old = '''void BtSmpAuthConfig(uint8_t IoCaps, uint8_t AuthReq)
          {
          '''
          new = '''__attribute__((weak))
          void BtSmpAuthConfig(uint8_t IoCaps, uint8_t AuthReq)
          {
          '''
          if text.count(old) != 1:
              raise RuntimeError('BtSmpAuthConfig definition anchor mismatch')
          text = text.replace(old, new, 1)

          old = '''\tpRsp->OOBFlag = (s_SmpOob.bPeerValid && pLink->Ctx.bSc) ?
          '''
          new = '''\tpRsp->OOBFlag = (SmpOobPeerReady(pLink) && pLink->Ctx.bSc) ?
          '''
          if text.count(old) != 1:
              raise RuntimeError('OOB response anchor mismatch')
          text = text.replace(old, new, 1)

          path.write_text(text, encoding='ascii', newline='\n')
          PY

      - name: Check source
        shell: bash
        run: |
          git diff --check
          if git diff -U0 -- '*.c' '*.cpp' '*.h' | grep '^+' | grep -v '^+++' | grep -inE '\bbackend\b|\bcontract\b|source of truth|\bcarries\b|resting value'; then
            exit 1
          fi
          python3 - <<'PY'
          from pathlib import Path
          files = [
              'ARM/Nordic/nRF54/src/bt_app_bm.cpp',
              'ARM/src/crypto_cc3xx.cpp',
              'include/crypto/crypto.h',
              'src/bluetooth/bt_smp.cpp',
              'src/crypto/crypto.cpp',
          ]
          for name in files:
              text = Path(name).read_text(encoding='ascii')
              assert text.count('{') == text.count('}'), name
          PY

      - name: Compile portable sources
        shell: bash
        run: |
          g++ -std=gnu++23 -fno-exceptions -fno-rtti -Iinclude -c \
            src/bluetooth/bt_smp.cpp -o /tmp/bt_smp.o
          g++ -std=gnu++23 -fno-exceptions -fno-rtti -Iinclude -fsyntax-only \
            src/crypto/crypto.cpp
          test "$(nm -C /tmp/bt_smp.o | awk '/ BtSmpAuthConfig\(/ {print $2}')" = W

          cat > /tmp/bt_smp_auth_override.cpp <<'CPP'
          #include <stdint.h>
          void BtSmpAuthConfig(uint8_t, uint8_t) {}
          CPP
          g++ -std=gnu++23 -c /tmp/bt_smp_auth_override.cpp -o /tmp/bt_smp_auth_override.o
          g++ -r /tmp/bt_smp.o /tmp/bt_smp_auth_override.o -o /tmp/bt_smp_combined.o
          test "$(nm -C /tmp/bt_smp_combined.o | awk '/ BtSmpAuthConfig\(/ {print $2}')" = T

      - name: Remove temporary files
        shell: bash
        run: |
          rm -f \
            .github/apply_rftag_core.py \
            .github/bt_app_bm.patch \
            .github/bt_smp.patch.part00 \
            .github/bt_smp.patch.part01 \
            .github/bt_smp.patch.part02 \
            .github/bt_smp.patch.part03 \
            .github/crypto_cc3xx.patch \
            .github/crypto_cc3xx.patch.gz.b64 \
            .github/crypto_cc3xx.patch.part00 \
            .github/crypto_cc3xx.patch.part01 \
            .github/crypto_cc3xx.patch.part02 \
            .github/rftag_devices.patch \
            .github/rftag_nordic.patch \
            .github/rftag_payload.part00 \
            .github/rftag_payload.part01 \
            .github/rftag_payload.part02 \
            .github/rftag_protocols.patch \
            .github/rftag-fix-error.txt \
            .github/workflows/apply-crypto-bluetooth.yml \
            .github/workflows/apply-crypto-bluetooth-v2.yml \
            .github/workflows/apply-crypto-bluetooth-v3.yml \
            .github/workflows/apply-rftag-core-recount.yml \
            .github/workflows/apply-rftag-remaining.yml \
            .github/workflows/apply-rftag-review-fixes.yml \
            .github/workflows/apply-rftag-review-pr.yml \
            .github/workflows/apply-rftag-source.yml \
            .github/workflows/diagnose-rftag-core.yml \
            .github/workflows/export-review-files.yml \
            .github/workflows/export-assembled-patches.yml \
            .github/workflows/finalize-bluetooth-crypto-review.yml

      - name: Commit final changes
        shell: bash
        run: |
          git add -A
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Complete Bluetooth and crypto review fixes'
          git push origin HEAD:fix/bluetooth-crypto-rftag-review
