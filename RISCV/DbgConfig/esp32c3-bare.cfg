# Vanilla OpenOCD config for ESP32-C3 — works with xPack OpenOCD,
# no Espressif fork required. Covers halt / step / breakpoints /
# memory access. Doesn't try to do flash programming via OpenOCD
# (use the IOcomposer flasher for that) and doesn't disable the
# chip's watchdogs (do that in TaktOS startup — see (3)).

adapter driver esp_usb_jtag
espusbjtag vid_pid 0x303A 0x1001
adapter speed 6000

set _CHIPNAME esp32c3
# JTAG IDCODE for ESP32-C3 ECO0..ECO3; ECO6/ECO7 use 0x0000A6CD.
jtag newtap $_CHIPNAME cpu -irlen 5 -ignore-version \
     -expected-id 0x00005C25 -expected-id 0x0000A6CD

set _TARGETNAME $_CHIPNAME.cpu
target create $_TARGETNAME riscv -chain-position $_TARGETNAME
$_TARGETNAME configure -work-area-phys 0x3FC80000 \
                       -work-area-size 0x4000 \
                       -work-area-backup 0

# The USB-JTAG bridge can pulse SRST (CHIP_PU on most boards).
reset_config srst_only srst_pulls_trst

init
halt