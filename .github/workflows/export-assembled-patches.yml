name: Export assembled review patches

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  export:
    if: github.head_ref == 'fix/bluetooth-crypto-rftag-review' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/bluetooth-crypto-rftag-review

      - name: Assemble patches
        shell: bash
        run: |
          mkdir -p /tmp/assembled-patches
          cat .github/crypto_cc3xx.patch.part00 \
              .github/crypto_cc3xx.patch.part01 \
              .github/crypto_cc3xx.patch.part02 > /tmp/assembled-patches/crypto.patch
          cat .github/bt_smp.patch.part00 \
              .github/bt_smp.patch.part01 \
              .github/bt_smp.patch.part02 \
              .github/bt_smp.patch.part03 > /tmp/assembled-patches/bt_smp.patch
          cp .github/bt_app_bm.patch /tmp/assembled-patches/

      - name: Upload patches
        uses: actions/upload-artifact@v4
        with:
          name: assembled-review-patches
          path: /tmp/assembled-patches
          if-no-files-found: error
