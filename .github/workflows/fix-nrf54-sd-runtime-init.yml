name: Fix nRF54 SoftDevice Runtime Init

on:
  push:
    branches:
      - cc3xx-review-fixes
    paths:
      - .github/fix_nrf54_sd_runtime_init.py
      - .github/workflows/fix-nrf54-sd-runtime-init.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: cc3xx-review-fixes
          fetch-depth: 0

      - name: Apply fix
        run: python3 .github/fix_nrf54_sd_runtime_init.py

      - name: Validate
        run: |
          grep -q 'constructor(101)' ARM/Nordic/nRF54/src/nrf_sdh.c
          grep -q 'NrfSdhRuntimeInit' ARM/Nordic/nRF54/src/nrf_sdh.c
          ! grep -q 'NrfSdhEarlyInit();' ARM/Nordic/nRF54/src/system_nrf54l.c
          ! grep -q 'extern void NrfSdhEarlyInit' ARM/Nordic/nRF54/src/system_nrf54l.c

      - name: Commit and remove temporary files
        run: |
          rm .github/fix_nrf54_sd_runtime_init.py .github/workflows/fix-nrf54-sd-runtime-init.yml
          git config user.name 'IOsonata automation'
          git config user.email 'automation@i-syst.com'
          git add ARM/Nordic/nRF54/src/nrf_sdh.c ARM/Nordic/nRF54/src/system_nrf54l.c .github
          git commit -m 'initialize nRF54 SoftDevice after C runtime'
          git push origin HEAD:cc3xx-review-fixes
