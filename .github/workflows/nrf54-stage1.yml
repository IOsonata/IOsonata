name: nRF54 Stage 1 migration

on:
  push:
    branches:
      - cc3xx-review-fixes
    paths:
      - .github/stage1_nrf54.py
      - .github/workflows/nrf54-stage1.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: cc3xx-review-fixes
          fetch-depth: 0

      - name: Apply and validate Stage 1
        shell: bash
        run: |
          set +e
          python3 .github/stage1_nrf54.py > /tmp/stage1.log 2>&1
          status=$?
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ "$status" -ne 0 ]; then
            git reset --hard HEAD
            git clean -fd
            cp /tmp/stage1.log stage1_nrf54_error.log
            git add stage1_nrf54_error.log
            git commit -m "record nRF54 Stage 1 migration failure"
            git push origin HEAD:cc3xx-review-fixes
            cat /tmp/stage1.log
            exit "$status"
          fi

          git diff --check
          git add -A
          git commit -m "bring nRF54 S145 to Stage 1 parity"
          git push origin HEAD:cc3xx-review-fixes
