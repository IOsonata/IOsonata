name: Move nRF54 SoftDevice Reset Early

on:
  push:
    branches:
      - cc3xx-review-fixes
    paths:
      - .github/move_nrf54_sd_reset_early.py
      - .github/workflows/move-nrf54-sd-reset-early.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: cc3xx-review-fixes
          fetch-depth: 0

      - name: Apply early reset move
        run: python3 .github/move_nrf54_sd_reset_early.py

      - name: Validate
        run: |
          grep -q 'void NrfSdhEarlyInit(void)' ARM/Nordic/nRF54/src/nrf_sdh.c
          grep -q 'sdh: early reset missing' ARM/Nordic/nRF54/src/nrf_sdh.c
          grep -q 'NrfSdhEarlyInit();' ARM/Nordic/nRF54/src/system_nrf54l.c
          ! grep -q 'sdh: before reset entry' ARM/Nordic/nRF54/src/nrf_sdh.c

      - name: Commit and remove temporary files
        run: |
          rm .github/move_nrf54_sd_reset_early.py .github/workflows/move-nrf54-sd-reset-early.yml
          git config user.name 'IOsonata automation'
          git config user.email 'automation@i-syst.com'
          git add ARM/Nordic/nRF54/src/nrf_sdh.c ARM/Nordic/nRF54/src/system_nrf54l.c .github
          git commit -m 'initialize nRF54 SoftDevice before peripherals'
          git push origin HEAD:cc3xx-review-fixes
