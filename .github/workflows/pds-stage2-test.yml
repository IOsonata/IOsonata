name: PDS Stage2 Host Test

on:
  push:
    branches:
      - cc3xx-review-fixes
    paths:
      - src/bluetooth/bt_pds.cpp
      - .github/pds_stage2_test.cpp
      - .github/workflows/pds-stage2-test.yml

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: cc3xx-review-fixes
          fetch-depth: 0

      - name: Build host test
        run: |
          g++ -std=c++17 -Wall -Wextra -Werror \
            -Iinclude \
            src/bluetooth/bt_pds.cpp \
            .github/pds_stage2_test.cpp \
            -o /tmp/pds_stage2_test

      - name: Run host test
        run: /tmp/pds_stage2_test

      - name: Remove temporary test files
        run: |
          rm .github/pds_stage2_test.cpp .github/workflows/pds-stage2-test.yml
          git config user.name 'IOsonata automation'
          git config user.email 'automation@i-syst.com'
          git add .github
          git commit -m 'remove temporary PDS stage2 test'
          git push origin HEAD:cc3xx-review-fixes
