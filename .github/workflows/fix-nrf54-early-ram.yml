name: Fix nRF54 Early SoftDevice RAM

on:
  push:
    branches:
      - cc3xx-review-fixes
    paths:
      - .github/fix_nrf54_early_ram.py
      - .github/workflows/fix-nrf54-early-ram.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: cc3xx-review-fixes
          fetch-depth: 0

      - name: Apply fix
        run: python3 .github/fix_nrf54_early_ram.py

      - name: Validate
        run: |
          grep -q 'const uintptr_t app_ram_start' ARM/Nordic/nRF54/src/nrf_sdh.c
          grep -q 'Do not erase it here' ARM/Nordic/nRF54/src/bt_app_bm.cpp
          ! grep -q 'BtAppDebugMarker' ARM/Nordic/nRF54/src/bt_app_bm.cpp
          ! grep -q 'SDH_TRACE' ARM/Nordic/nRF54/src/nrf_sdh.c
          ! grep -q 'memset((void *)0x20000000, 0, ramstart' ARM/Nordic/nRF54/src/bt_app_bm.cpp

      - name: Commit and remove temporary files
        run: |
          rm .github/fix_nrf54_early_ram.py .github/workflows/fix-nrf54-early-ram.yml
          git config user.name 'IOsonata automation'
          git config user.email 'automation@i-syst.com'
          git add ARM/Nordic/nRF54/src/nrf_sdh.c ARM/Nordic/nRF54/src/bt_app_bm.cpp .github
          git commit -m 'preserve nRF54 SoftDevice RAM after early reset'
          git push origin HEAD:cc3xx-review-fixes
