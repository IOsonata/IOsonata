name: nRF54 SDH Internal Trace

on:
  push:
    branches:
      - cc3xx-review-fixes
    paths:
      - .github/nrf54_sdh_trace.py
      - .github/workflows/nrf54-sdh-trace.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: cc3xx-review-fixes
          fetch-depth: 0

      - name: Apply trace
        run: python3 .github/nrf54_sdh_trace.py

      - name: Validate
        run: |
          grep -q 'sdh: before reset entry' ARM/Nordic/nRF54/src/nrf_sdh.c
          grep -q 'sdh: before is_enabled' ARM/Nordic/nRF54/src/nrf_sdh.c
          grep -q 'sdh: before sd_softdevice_enable' ARM/Nordic/nRF54/src/nrf_sdh.c
          grep -q 'BtAppDebugMarker' ARM/Nordic/nRF54/src/bt_app_bm.cpp

      - name: Commit and remove temporary files
        run: |
          rm .github/nrf54_sdh_trace.py .github/workflows/nrf54-sdh-trace.yml
          git config user.name 'IOsonata automation'
          git config user.email 'automation@i-syst.com'
          git add ARM/Nordic/nRF54/src/nrf_sdh.c ARM/Nordic/nRF54/src/bt_app_bm.cpp .github
          git commit -m 'trace nRF54 SoftDevice enable sequence'
          git push origin HEAD:cc3xx-review-fixes
