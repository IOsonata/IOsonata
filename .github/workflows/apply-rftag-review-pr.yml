name: Apply RFTag core fixes

on:
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'fix/bluetooth-crypto-rftag-review' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/bluetooth-crypto-rftag-review

      - name: Apply patch
        shell: bash
        run: |
          cat > /tmp/rftag-core.patch <<'PATCH'
          diff --git a/include/rftag/rftag.h b/include/rftag/rftag.h
          index a8b2978..0000000 100644
          --- a/include/rftag/rftag.h
          +++ b/include/rftag/rftag.h
          @@ -144,6 +144,14 @@ public:
            */
           	virtual int OnFrame(const uint8_t *pRx, int RxLen, uint8_t *pTx, int TxCap) = 0;
          +
          +	/**
          +	 * @brief	Number of response bits from the last OnFrame call.
          +	 *
          +	 * Byte framed protocols use TxLen * 8. A protocol with a short
          +	 * response overrides this method.
          +	 */
          +	virtual int ResponseBits(int TxLen) const { return TxLen > 0 ? TxLen * 8 : 0; }
           
           protected:
           	RFTag *vpTag;					//!< Tag served by this engine
          @@ -220,6 +228,13 @@ public:
            */
           	virtual int ProcessFrame(const uint8_t *pRx, int RxLen, uint8_t *pTx, int TxCap);
          +
          +	/**
          +	 * @brief	Number of response bits from the last ProcessFrame call.
          +	 */
          +	int ResponseBits(int TxLen) const {
          +		return vpProto != nullptr ? vpProto->ResponseBits(TxLen) : 0;
          +	}
           
           	/**
           	 * @brief	Read tag memory. The base reads the local image.
          diff --git a/src/rftag/rftag.cpp b/src/rftag/rftag.cpp
          index 4a5b056..0000000 100644
          --- a/src/rftag/rftag.cpp
          +++ b/src/rftag/rftag.cpp
          @@ -43,41 +43,37 @@
           bool RFTag::Init(const RFTagCfg_t &Cfg, DeviceIntrf * const pIntrf)
           {
          -	// A failed Init must not leave a previously initialized object usable.
           	Valid(false);
          -
          -	vCfg = Cfg;
          +	Interface(nullptr);
           	vpProto = nullptr;
          +	memset(&vCfg, 0, sizeof(vCfg));
           
          -	Interface(pIntrf);
          +	RFTagCfg_t cfg = Cfg;
           
           	// The base is a local memory tag. It requires the image and a NDEF area
          -	// inside it. A bus tag subclass overrides Init and lifts this.
          -	if (vCfg.pMem == nullptr || vCfg.MemSize == 0)
          -	{
          -		return false;
          -	}
          -
          -	if (vCfg.NdefAddr >= vCfg.MemSize)
          +	// inside it. A bus tag subclass validates its own memory access.
          +	if (cfg.pMem == nullptr || cfg.MemSize == 0 || cfg.NdefAddr >= cfg.MemSize)
           	{
           		return false;
           	}
           
          -	// NdefMaxLen of 0 selects the remainder of the tag memory.
          -	uint32_t avail = vCfg.MemSize - vCfg.NdefAddr;
          +	uint32_t avail = cfg.MemSize - cfg.NdefAddr;
           
          -	if (vCfg.NdefMaxLen == 0)
          +	if (cfg.NdefMaxLen == 0)
           	{
          -		vCfg.NdefMaxLen = avail;
          +		cfg.NdefMaxLen = avail;
           	}
           
          -	// Subtraction form, the additive form can wrap on large offsets.
          -	if (vCfg.NdefMaxLen > avail)
          +	if (cfg.NdefMaxLen > avail)
           	{
           		return false;
           	}
           
          +	vCfg = cfg;
          +	Interface(pIntrf);
           	Valid(true);
           
           	return true;
           }
           
           void RFTag::Reset()
           {
          -	if (vpProto)
          +	if (vpProto != nullptr && vpProto->Init(this) == false)
           	{
          -		vpProto->Init(this);
          +		vpProto = nullptr;
          +		EvtHandler(RFTAG_EVT_ERROR, 0, 0);
           	}
           }
          @@ -108,7 +104,8 @@ bool RFTag::Attach(RFTagProto * const pProto)
           
           int RFTag::ProcessFrame(const uint8_t *pRx, int RxLen, uint8_t *pTx, int TxCap)
           {
          -	if (vpProto == nullptr)
          +	if (Valid() == false || vpProto == nullptr || pRx == nullptr || RxLen <= 0 ||
          +		TxCap < 0 || (TxCap > 0 && pTx == nullptr))
           	{
           		return 0;
           	}
          @@ -119,7 +116,8 @@ int RFTag::ProcessFrame(const uint8_t *pRx, int RxLen, uint8_t *pTx, int TxCap)
           
           int RFTag::MemRead(uint32_t Addr, uint8_t *pBuff, int Len)
           {
          -	if (pBuff == nullptr || Len <= 0 || Addr >= vCfg.MemSize)
          +	if (Valid() == false || vCfg.pMem == nullptr || pBuff == nullptr ||
          +		Len <= 0 || Addr >= vCfg.MemSize)
           	{
           		return 0;
           	}
          @@ -141,7 +139,8 @@ int RFTag::MemRead(uint32_t Addr, uint8_t *pBuff, int Len)
           
           int RFTag::MemWrite(uint32_t Addr, const uint8_t *pData, int Len)
           {
          -	if (pData == nullptr || Len <= 0 || Addr >= vCfg.MemSize)
          +	if (Valid() == false || vCfg.pMem == nullptr || pData == nullptr ||
          +		Len <= 0 || Addr >= vCfg.MemSize)
           	{
           		return 0;
           	}
          @@ -163,23 +162,30 @@ int RFTag::MemWrite(uint32_t Addr, const uint8_t *pData, int Len)
           
           bool RFTag::SetNdefNLen16(const uint8_t *pNdef, uint16_t Len)
           {
          -	uint8_t hdr[2];
          +	uint8_t hdr[2] = { 0, 0 };
           
          -	// Length prefix plus payload must fit the NDEF area
           	if ((uint32_t)Len + sizeof(hdr) > vCfg.NdefMaxLen)
           	{
           		return false;
           	}
           
          -	hdr[0] = (uint8_t)(Len >> 8);
          -	hdr[1] = (uint8_t)Len;
          -
          +	// Keep the message empty until the complete payload is stored.
           	if (MemWrite(vCfg.NdefAddr, hdr, sizeof(hdr)) != (int)sizeof(hdr))
           	{
           		return false;
           	}
           
          -	return MemWrite(vCfg.NdefAddr + sizeof(hdr), pNdef, Len) == Len;
          +	if (Len > 0 && MemWrite(vCfg.NdefAddr + sizeof(hdr), pNdef, Len) != Len)
          +	{
          +		return false;
          +	}
          +
          +	hdr[0] = (uint8_t)(Len >> 8);
          +	hdr[1] = (uint8_t)Len;
          +
          +	return MemWrite(vCfg.NdefAddr, hdr, sizeof(hdr)) == (int)sizeof(hdr);
           }
           
           bool RFTag::SetNdefTlv(const uint8_t *pNdef, uint16_t Len)
           {
           	uint8_t hdr[4];
          +	uint8_t pending[4];
           	uint32_t addr = vCfg.NdefAddr;
           	int hlen = 0;
          @@ -211,25 +217,40 @@ bool RFTag::SetNdefTlv(const uint8_t *pNdef, uint16_t Len)
           		hdr[hlen++] = (uint8_t)Len;
           	}
           
          -	if (MemWrite(addr, hdr, hlen) != hlen)
          +	memcpy(pending, hdr, hlen);
          +	if (hlen == 2)
          +	{
          +		pending[1] = 0;
          +	}
          +	else
          +	{
          +		pending[2] = 0;
          +		pending[3] = 0;
          +	}
          +
          +	if (MemWrite(addr, pending, hlen) != hlen)
           	{
           		return false;
           	}
           
           	addr += hlen;
           
          -	if (MemWrite(addr, pNdef, Len) != Len)
          +	if (Len > 0 && MemWrite(addr, pNdef, Len) != Len)
           	{
           		return false;
           	}
           
           	addr += Len;
           
           	uint8_t term = 0xFE;
           
          -	return MemWrite(addr, &term, 1) == 1;
          +	if (MemWrite(addr, &term, 1) != 1)
          +	{
          +		return false;
          +	}
          +
          +	return MemWrite(vCfg.NdefAddr, hdr, hlen) == hlen;
           }
           
           bool RFTag::SetNdef(const uint8_t *pNdef, uint16_t Len)
           {
          -	if (Len > 0 && pNdef == nullptr)
          +	if (Valid() == false || (Len > 0 && pNdef == nullptr))
           	{
           		return false;
           	}
          @@ -401,7 +422,7 @@ int RFTag::GetNdefTlv(uint8_t *pNdef, uint16_t Len)
           
           int RFTag::GetNdef(uint8_t *pNdef, uint16_t Len)
           {
          -	if (pNdef == nullptr || Len == 0)
          +	if (Valid() == false || pNdef == nullptr || Len == 0)
           	{
           		return 0;
           	}
          PATCH
          sed -i 's/^          //' /tmp/rftag-core.patch
          git apply --check /tmp/rftag-core.patch
          git apply /tmp/rftag-core.patch

      - name: Validate
        shell: bash
        run: |
          git diff --check
          if git diff -U0 -- '*.c' '*.cpp' '*.h' | grep '^+' | grep -v '^+++' | grep -inE '\bbackend\b|\bcontract\b|source of truth|\bcarries\b|resting value'; then
            exit 1
          fi
          python3 - <<'PY'
          from pathlib import Path
          for name in ['include/rftag/rftag.h', 'src/rftag/rftag.cpp']:
              text = Path(name).read_text(encoding='ascii')
              assert text.count('{') == text.count('}')
          PY
          g++ -std=gnu++23 -fno-exceptions -fno-rtti -Iinclude -fsyntax-only src/rftag/rftag.cpp

      - name: Commit
        shell: bash
        run: |
          git add include/rftag/rftag.h src/rftag/rftag.cpp
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Fix RFTag state and NDEF updates'
          git push origin HEAD:fix/bluetooth-crypto-rftag-review
