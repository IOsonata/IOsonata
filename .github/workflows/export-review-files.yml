name: Export review files

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  export:
    if: github.head_ref == 'fix/bluetooth-crypto-rftag-review' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/bluetooth-crypto-rftag-review

      - name: Collect files
        shell: bash
        run: |
          mkdir -p /tmp/review-files
          rsync -aR \
            include/bluetooth \
            include/crypto \
            include/rftag \
            src/bluetooth \
            src/crypto \
            src/rftag \
            ARM/src/crypto_cc3xx.cpp \
            ARM/Nordic/include/nfct_nrfx.h \
            ARM/Nordic/src/nfct_nrfx.cpp \
            ARM/Nordic/src/bt_app_sdc.cpp \
            ARM/Nordic/nRF54/src/bt_app_bm.cpp \
            ARM/Nordic/exemples/rftag_t4t_demo_port_nrfx.cpp \
            ARM/Nordic/nRF54/nRF54L15/lib/Eclipse/.cproject \
            ARM/Nordic/nRF52/nRF52832/lib/Eclipse/.cproject \
            ARM/Nordic/nRF52/nRF52840/lib/Eclipse/.cproject \
            exemples/bluetooth/uart_ble.cpp \
            exemples/bluetooth/uart_ble_central.cpp \
            /tmp/review-files/

      - name: Upload files
        uses: actions/upload-artifact@v4
        with:
          name: review-files
          path: /tmp/review-files
          if-no-files-found: error
