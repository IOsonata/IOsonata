name: Apply RFTag review fixes

on:
  push:
    branches:
      - fix/bluetooth-crypto-rftag-review
    paths:
      - .github/workflows/apply-rftag-review-fixes.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/bluetooth-crypto-rftag-review

      - name: Apply edits
        shell: bash
        run: |
          printf '%s' '' | base64 -d | gzip -d > /tmp/apply_rftag_fixes.py
          python3 /tmp/apply_rftag_fixes.py

      - name: Validate edits
        shell: bash
        run: |
          git diff --check
          if git diff -U0 -- '*.c' '*.cpp' '*.h' | grep '^+' | grep -v '^+++' | grep -inE '\bbackend\b|\bcontract\b|source of truth|\bcarries\b|resting value'; then
            exit 1
          fi
          g++ -std=gnu++23 -fno-exceptions -fno-rtti -Iinclude -fsyntax-only \
            src/rftag/rftag.cpp \
            src/rftag/rftag_proto_t2.cpp \
            src/rftag/rftag_proto_t4.cpp \
            src/rftag/rftag_proto_iso15693.cpp

      - name: Commit edits
        shell: bash
        run: |
          git rm .github/workflows/apply-rftag-review-fixes.yml
          git add -A
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Fix RFTag validation and frame handling'
          git push origin HEAD:fix/bluetooth-crypto-rftag-review
