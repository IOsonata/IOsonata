name: Fix nRF54 SoftDevice Reset

on:
  push:
    branches:
      - cc3xx-review-fixes
    paths:
      - .github/fix_nrf54_sdh_reset.py
      - .github/workflows/fix-nrf54-sdh-reset.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: cc3xx-review-fixes
          fetch-depth: 0

      - name: Apply reset fix
        run: python3 .github/fix_nrf54_sdh_reset.py

      - name: Validate
        run: |
          grep -q 'CallSoftDeviceResetHandler();' ARM/Nordic/nRF54/src/nrf_sdh.c
          grep -q 'softdevice_reset_done = true;' ARM/Nordic/nRF54/src/nrf_sdh.c

      - name: Commit and remove temporary files
        run: |
          rm .github/fix_nrf54_sdh_reset.py .github/workflows/fix-nrf54-sdh-reset.yml
          git config user.name 'IOsonata automation'
          git config user.email 'automation@i-syst.com'
          git add ARM/Nordic/nRF54/src/nrf_sdh.c .github
          git commit -m 'initialize nRF54 SoftDevice before SVC calls'
          git push origin HEAD:cc3xx-review-fixes
